<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1526"/>
      <stop offset="1" stop-color="#0f2138"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- hazard bar -->
  <rect width="1200" height="10" fill="#FFC400"/>
  <g opacity="0.08" fill="#9fb4d6">
    <circle cx="1040" cy="120" r="2"/><circle cx="1080" cy="120" r="2"/><circle cx="1120" cy="120" r="2"/>
    <circle cx="1040" cy="160" r="2"/><circle cx="1080" cy="160" r="2"/><circle cx="1120" cy="160" r="2"/>
  </g>

  <!-- mark -->
  <g transform="translate(90 90)">
    <path d="M30 0 0 9v16c0 14 9.5 24.8 30 30 20.5-5.2 30-16 30-30V9L30 0Z" fill="#0B1A30" stroke="#FFC400" stroke-width="2.4"/>
    <path d="M16 40h28c0-8-5.2-14-10.3-15.4V21a3.7 3.7 0 0 0-7.4 0v3.6C21.2 26 16 32 16 40Z" fill="#FFC400"/>
    <rect x="13" y="39.5" width="34" height="4.2" rx="2" fill="#FFC400"/>
  </g>
  <text x="170" y="125" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">SafeSite <tspan fill="#FFC400">Docs</tspan></text>

  <!-- headline -->
  <text x="90" y="300" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Safety paperwork for</text>
  <text x="90" y="382" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">contractors — <tspan fill="#FFC400">organized.</tspan></text>

  <text x="90" y="452" font-family="Arial, sans-serif" font-size="30" fill="#a6b8d6">Editable templates, toolbox talks &amp; custom safety binders.</text>

  <!-- chips -->
  <g font-family="Arial, sans-serif" font-size="24" font-weight="700">
    <rect x="90" y="500" width="280" height="56" rx="28" fill="#FFC400"/>
    <text x="230" y="537" fill="#0B1A30" text-anchor="middle">Get the Library</text>
    <rect x="390" y="500" width="320" height="56" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.3"/>
    <text x="550" y="537" fill="#ffffff" text-anchor="middle">Build My Binder</text>
  </g>
</svg>
